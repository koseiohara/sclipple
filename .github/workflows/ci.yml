name: CI

on:
  push:
  pull_request:

jobs:
  build-configure:
    name: ${{ matrix.os }} / ${{ matrix.cc }} / ${{ matrix.mode }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        cc:
          - gcc
          - clang
        mode:
          - normal
          - bootstrap
          - out-of-tree

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang autoconf automake git

      - name: Set compiler
        run: echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"

      - name: Normal configure build
        if: matrix.mode == 'normal'
        run: |
          ./configure
          make -j"$(nproc)"
          bash tests/cli.sh
          make clean
          make -j"$(nproc)"

      - name: Bootstrap configure build
        if: matrix.mode == 'bootstrap'
        run: |
          autoreconf -fi
          ./configure
          make -j"$(nproc)"
          bash tests/cli.sh
          make clean
          make -j"$(nproc)"

      - name: Out-of-tree build
        if: matrix.mode == 'out-of-tree'
        run: |
          mkdir build
          cd build
          ../configure
          make -j"$(nproc)"
          bash ../tests/cli.sh ../build/src/sclipple
          make clean
          make -j"$(nproc)"

  distcheck:
    name: distcheck
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake git

      - name: Distcheck
        run: |
          autoreconf -fi
          ./configure
          make distcheck
