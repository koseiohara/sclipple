name: CI

on:
  push:
  pull_request:

jobs:
  build-configure:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        mode:
          - normal
          - bootstrap
          - out-of-tree
          - distcheck

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake git

      - name: Normal configure build
        if: matrix.mode == 'normal'
        run: |
          ./configure
          make -j"$(nproc)"
          bash tests/cli.sh

      - name: Bootstrap configure build
        if: matrix.mode == 'bootstrap'
        run: |
          autoreconf -fi
          ./configure
          make -j"$(nproc)"
          bash tests/cli.sh

      - name: Out-of-tree build
        if: matrix.mode == 'out-of-tree'
        run: |
          mkdir build
          cd build
          ../configure
          make -j"$(nproc)"
          bash ../tests/cli.sh ../build/src/sclipple

      - name: Distcheck
        if: matrix.mode == 'distcheck'
        run: |
          autoreconf -fi
          ./configure
          make distcheck


